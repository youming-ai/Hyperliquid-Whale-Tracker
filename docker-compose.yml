services:
  # PostgreSQL
  postgres:
    image: postgres:15-alpine
    container_name: hyperdash-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: hyperdash
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - hyperdash-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis
  redis:
    image: redis:7-alpine
    container_name: hyperdash-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - hyperdash-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  hyperdash-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
